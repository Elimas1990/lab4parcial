<h4 class="mb-3">Actores</h4>

  <div class="row">
    <div class="col-md-6 mb-3">
      <label for="nombre">Nombre</label>
      <input type="text" class="form-control" id="nombre" placeholder="" value="" required>
      <div class="invalid-feedback">
        Valid first name is required.
      </div>
    </div>
    <div class="col-md-6 mb-3">
      <label for="apellido">Apellido</label>
      <input type="text" class="form-control" id="apellido" placeholder="" value="" required>
      <div class="invalid-feedback">
        Valid last name is required.
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-md-6 mb-3">
      <label for="domicilio">Domicilio</label>
      <input type="text" class="form-control" id="domicilio" placeholder="" value="" required>
      <div class="invalid-feedback">
        Valid first name is required.
      </div>
    </div>
    <div class="col-md-6 mb-3">
      <label for="lastName">Fecha de Nacimiento</label>
      <input type="date" class="form-control" id="lastName" placeholder="" value="" required>
      <div class="invalid-feedback">
        Valid last name is required.
      </div>
    </div>
  </div>
  <div class="row">
    <div class="col-md-6 mb-3">
      <label for="nacionalidad">Nacionalidad</label>
      <input type="text" class="form-control" id="nacionalidad" placeholder="" value="" [(ngModel)]="pais"  required>
      <div class="invalid-feedback">
        Valid first name is required.
      </div>
    </div>
    <div class="col-md-6 mb-3">
      <label for="foto">Foto</label>
      <input type="img" class="form-control" id="foto" placeholder="" value="" required>
      <div class="invalid-feedback">
        Valid last name is required.
      </div>
    </div>
  </div>
  <div class="d-block my-3">
    <div class="custom-control custom-radio">
      <input id="masculino" name="genero" type="radio" class="custom-control-input" checked required>
      <label class="custom-control-label" for="masculino">Masculino</label>
    </div>
    <div class="custom-control custom-radio">
      <input id="femenino" name="genero" type="radio" class="custom-control-input" required>
      <label class="custom-control-label" for="femenino">Femenino</label>
    </div>
  </div>

  <hr class="mb-4">
  <button class="btn btn-primary btn-lg btn-block" type="submit">Continue to checkout</button>
