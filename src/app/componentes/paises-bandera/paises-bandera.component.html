<div class="row" >
    <div class="col-md-4"  *ngFor="let pais of filterFunction(paises) ; index as i">
        <!--div class="card mb-4 shadow-sm" *ngIf="filtrarRegion(pais.region)" -->
        <div class="card mb-4 shadow-sm" >
            <img [src]="pais.flag" class="img" alt="" style="max-height:12vw;">
            <div class="card-body">
                <p class="card-text">{{pais.name}}</p>
                <div class="d-flex justify-content-between align-items-center">
                    <div class="btn-group">
                    <button type="button" class="btn btn-sm btn-outline-secondary">View</button>
                    <button type="button" class="btn btn-sm btn-outline-secondary">Edit</button>
                    </div>
                    <small class="text-muted">{{i}}</small>
                </div>
            </div>
        </div>
    </div>
</div>
